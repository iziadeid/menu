<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restaurant Menu</title>
  <style>
    :root {
      --primary: #e91e63;
      --bg: #fdfdfd;
      --text: #222;
      --shadow: rgba(0, 0, 0, 0.08);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .menu-wrapper {
      max-width: 800px;
      width: 100%;
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 30px var(--shadow);
      overflow: hidden;
      text-align: center;
    }

    .menu-header {
      background: var(--primary);
      color: white;
      padding: 1.5rem;
    }

    .menu-header h1 {
      font-size: 28px;
      letter-spacing: 1px;
    }

    .menu-image {
      width: 100%;
      display: block;
      border-top: 2px solid #eee;
    }

    .menu-footer {
      padding: 1rem;
      font-size: 14px;
      color: #888;
      background: #fafafa;
    }

    @media (max-width: 600px) {
      .menu-header h1 {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>
  <div class="menu-wrapper">
    <div class="menu-header">
      <h1>اسم المطعم | Restaurant Name</h1>
    </div>

    <!-- Replace with your own image -->
    <img class="menu-image" src="menu.jpg" alt="Restaurant Menu" />

    <div class="menu-footer">
      Scan the QR code again to view latest updates ✨
    </div>
  </div>
</body>
</html>
