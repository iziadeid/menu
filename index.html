<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restaurant Menu</title>
  <style>
    :root {
      --primary: #e91e63;
      --bg: #fdfdfd;
      --card-bg: #ffffff;
      --text: #222;
      --footer-bg: #f4f4f4;
      --shadow: rgba(0, 0, 0, 0.08);
      --border: #eee;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #121212;
        --card-bg: #1e1e1e;
        --text: #f0f0f0;
        --footer-bg: #1a1a1a;
        --shadow: rgba(255, 255, 255, 0.05);
        --border: #333;
      }
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 2rem;
      transition: background 0.3s, color 0.3s;
    }

    .menu-wrapper {
      max-width: 800px;
      width: 100%;
      background: var(--card-bg);
      border-radius: 16px;
      box-shadow: 0 10px 30px var(--shadow);
      overflow: hidden;
      text-align: center;
      transition: background 0.3s, box-shadow 0.3s;
    }

    .menu-header {
      background: var(--primary);
      color: white;
      padding: 1.5rem;
    }

    .menu-header h1 {
      font-size: 28px;
      letter-spacing: 0.5px;
      font-weight: 600;
    }

    .menu-image {
      width: 100%;
      display: block;
      border-top: 2px solid var(--border);
      border-bottom: 2px solid var(--border);
    }

    .menu-footer {
      padding: 1rem;
      font-size: 14px;
      color: #888;
      background: var(--footer-bg);
      transition: background 0.3s, color 0.3s;
    }

    @media (max-width: 600px) {
      .menu-header h1 {
        font-size: 22px;
      }

      .menu-footer {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <div class="menu-wrapper">
    <div class="menu-header">
      <h1>اسم المطعم | Restaurant Name</h1>
    </div>

    <!-- Replace with your own menu image -->
    <img class="menu-image" src="menu.jpeg" alt="Restaurant Menu" />

    <div class="menu-footer">
      📱 Scan the QR code again to check for updates!
    </div>
  </div>
</body>
</html>
