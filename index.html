<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restaurant Menu</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --primary: #e91e63;
      --bg: #fdfdfd;
      --card-bg: #ffffff;
      --text: #222;
      --footer-bg: #f4f4f4;
      --shadow: rgba(0, 0, 0, 0.08);
      --border: #eee;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #121212;
        --card-bg: #1e1e1e;
        --text: #f0f0f0;
        --footer-bg: #1a1a1a;
        --shadow: rgba(255, 255, 255, 0.05);
        --border: #333;
      }
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .menu-wrapper {
      max-width: 800px;
      width: 100%;
      background: var(--card-bg);
      border-radius: 16px;
      box-shadow: 0 10px 30px var(--shadow);
      overflow: hidden;
      text-align: center;
      transition: background 0.3s, box-shadow 0.3s;
    }

    .menu-header {
      padding: 2rem 1rem 1rem;
      background: var(--card-bg);
    }

    .logo {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 1rem;
      box-shadow: 0 0 5px var(--shadow);
    }

    .restaurant-name {
      font-size: 26px;
      font-weight: 600;
      margin-bottom: 0.3rem;
    }

    .restaurant-address {
      font-size: 15px;
      color: #777;
    }

    .menu-image {
      width: 100%;
      display: block;
      border-top: 2px solid var(--border);
      border-bottom: 2px solid var(--border);
    }

    .menu-footer {
      padding: 1.5rem;
      font-size: 14px;
      background: var(--footer-bg);
      color: #666;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      align-items: center;
    }

    .menu-footer a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
    }

    .social-icons {
      display: flex;
      gap: 15px;
    }

    .social-icons a {
      font-size: 18px;
      color: #999;
      transition: color 0.3s;
    }

    .social-icons a:hover {
      color: var(--primary);
    }

    @media (max-width: 600px) {
      .restaurant-name {
        font-size: 20px;
      }
      .menu-footer {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <div class="menu-wrapper">
    <div class="menu-header">
      <img src="logo.jpg" alt="Restaurant Logo" class="logo" />
      <div class="restaurant-name">اسم المطعم | Restaurant Name</div>
      <div class="restaurant-address">
        📍 123 Food Street, Cairo, Egypt<br>
        <a href="https://goo.gl/maps/XxXxXxX" target="_blank">View on Map</a>
      </div>
    </div>

    <!-- Replace this image with your actual menu image -->
    <img class="menu-image" src="menu.jpg" alt="Restaurant Menu" />

    <div class="menu-footer">
      <div>📱 Scan the QR code again to view the latest menu</div>
      <div class="social-icons">
        <a href="https://facebook.com/yourrestaurant" target="_blank"><i class="fab fa-facebook"></i></a>
        <a href="https://instagram.com/yourrestaurant" target="_blank"><i class="fab fa-instagram"></i></a>
        <a href="https://wa.me/1234567890" target="_blank"><i class="fab fa-whatsapp"></i></a>
      </div>
    </div>
  </div>
</body>
</html>
